schema_version: 1
adapter_id: qianlima-enterprise-governance-adapter
purpose: Enforce the Broker contract around every governed runtime without duplicating provider-specific security plugins.
authoritative_control_plane: qianlima_broker
fail_closed: true

interception_points:
  session_start:
    before: [identity_bind, admission_check, task_envelope_create]
    on_failure: deny
  pre_action:
    covers: [a2a_dispatch, mcp_call, file_read, file_write, network_call, memory_read, artifact_write]
    requires: [continuous_trust_check, grant_check, budget_check, data_scope_check]
    result: [allow, shrink, pause, isolate, revoke, freeze]
  post_action:
    covers: [tool_result, external_response, artifact_created]
    requires: [content_scan, metadata_check, trace_event, budget_record]
    on_failure: reject_and_freeze
  session_end:
    requires: [artifact_receipt, verification_status, grant_revoke, terminal_event]

data_handling:
  default_input: reference_hash_and_sanitized_summary
  raw_private_data: deny
  secrets: secret_ref_only
  full_memory: deny
  external_transfer: allowlist_and_task_scoped_only
  artifact_fanout: immutable_artifact_plus_policy_scoped_views

provider_adapters:
  codex: optional_hook_or_wrapper
  claude_code: optional_hook_or_wrapper
  codewhale: optional_runner_adapter
  kimi_cli: optional_runner_adapter
  mimo_cli: optional_runner_adapter
  other_cli: optional_runner_adapter
  contract_authority: broker_grant_and_trace

recovery:
  transient: bounded_retry_then_shrink
  task_failure: no_automatic_permission_expansion
  verifier_failure: freeze_and_request_review
  needs_human: pause_and_preserve_receipts
  cancelled_task: revoke_unstarted_grants_and_mark_downstream_discarded
