schema_version: 1
policy_id: qianlima-enterprise-managed-environment
mode: mandatory_managed_deployment

startup_gate:
  required: true
  on_failure: block_enterprise_start
  bypass_for_ordinary_user: false
  remediation_owner: enterprise_administrator

required_components:
  windows:
    - docker_desktop_approved_license
    - docker_cli
    - docker_daemon_linux_containers
    - wsl2_or_hyperv_backend
    - approved_local_runner_image
  macos:
    - docker_desktop_approved_license
    - docker_cli
    - docker_daemon_linux_containers
    - native_linux_virtualization
    - powershell_7
    - approved_local_runner_image
  linux:
    - approved_managed_docker_engine
    - docker_cli
    - docker_daemon_linux_containers
    - powershell_7
    - approved_local_runner_image

required_runtime_contract:
  runner_id: docker_local_isolated
  provider: docker
  image: alpine:3.20
  image_pull_during_startup: deny
  host_workspace_mount: deny
  agent_network: none
  file_export: deny
  web_access: deny
  erp_access: deny
  secrets: secret_ref_only

authority_boundary:
  deployment_ready_is_execution_authority: false
  task_bound_attestation_still_required: true
  grant_still_required: true
  human_L4_confirmation_still_required: true
  environment_installation_must_not_change_broker_policy: true

installer_policy:
  ordinary_start_may_install: false
  administrator_action_required: true
  docker_desktop_license_acceptance_required: true
  reboot_may_be_required: true
  provider_credentials_installed: false
  business_data_migrated: false
