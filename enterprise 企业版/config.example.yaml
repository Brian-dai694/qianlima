enterprise_config:
  deployment_mode:
    id: E2
    enterprise_api: true
    enterprise_agent: false
    credential_mode: gateway_short_lived_secret_ref
    # Selecting a mode grants no Agent, MCP, data, network, or execution authority.
  tenant_id: example-tenant
  organization_id: example-organization
  identity:
    provider: none_until_configured
    issuer_ref: secret_ref_only
  audit:
    central_sink_enabled: false
    endpoint_ref: secret_ref_only
    local_append_only_trace: true
  providers:
    openai_credential_ref: model_provider_openai
    anthropic_credential_ref: model_provider_anthropic
    enabled: false
  runners:
    preferred: docker_local_isolated
    require_attestation: true
    enable_real_execution: false
  approvals:
    l4_confirmation: required
    production_promotion: required
    policy_exception: required

# Never put token values, URLs containing credentials, customer data, or
# private tenant identifiers in this file. Use the operating system or an
# approved secret manager and reference values by ID only.
