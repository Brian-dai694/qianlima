skill_evolution:
  version: v2.7.8
  mode: observe_then_propose
  purpose: >
    Turn real user feedback into traceable, small, and reversible skill improvements.
    Low-risk candidates auto-release after independent validation; high-risk candidates freeze without interrupting ordinary work.

  three_layers:
    routing:
      targets:
        - natural-language-router.yaml
        - skill-registry.yaml
      use_when: "The wrong skill was selected, a trigger was missed, or a trigger was too broad."
    instruction:
      targets:
        - task-cards/
        - workflows/
        - templates/
      use_when: "The selected skill followed an incomplete, unstable, or unsafe workflow."
    resource:
      targets:
        - rules/
        - playbooks/
        - scripts/
      use_when: "A recurring specialized constraint, example, or deterministic operation is needed."

  feedback_record:
    private_storage: feedback/skill-evolution/
    required_fields:
      - skill_id
      - layer_candidate
      - feedback_type
      - feedback_summary
      - evidence_paths
      - source_run_id
      - confidence
    redact_before_write:
      - api_key
      - token
      - password
      - email
      - phone

  proposal_policy:
    minimum_evidence:
      repeated_pattern: 2
      explicit_user_correction: 1
      safety_or_privacy_issue: 1
    required_fields:
      - target_layer
      - target_file
      - problem_statement
      - proposed_change
      - evidence_paths
      - success_metric
      - rollback_plan
    forbidden:
      - automatic_production_skill_edit
      - automatic_router_expansion
      - automatic_permission_change

  validation:
    compare:
      - baseline_skill_version
      - candidate_skill_version
    required_checks:
      - target_metric_improves
      - no_risk_gate_regression
      - cost_does_not_exceed_baseline_by_20_percent
      - private_feedback_is_not_committed
    promotion:
      requires_human_approval: false
      versioning: patch_increment
      automatic_low_risk_release: true
      automatic_release_requires:
        - independent_validation_passed
        - skill_router_task_card_or_workflow_layer_only
        - no_permission_or_attack_surface_change
        - no_network_write_export_or_delegation_capability
        - rollback_reference_present
    rollback:
      trigger: "metric regresses or risk gate fails"
      action: restore_prior_skill_version

  compaction:
    frequency: monthly
    rules:
      - merge_duplicate_rules
      - move niche_constraints_to_resources
      - remove_unvalidated_candidates
      - keep_skill_entry_under_500_lines

  management:
    contract: .qianlima/specifications/skill-self-evolution-contract.json
    entrypoint: .qianlima/scripts/invoke-skill-self-evolution.ps1
    event_log: .qianlima/evolution/skill-self-evolution-events.jsonl
    state_machine: feedback_recorded -> evidence_collected -> rule_abstracted -> patch_candidate_created -> replay_validated -> released -> rolled_back
    automatic_low_risk_release: true
    automatic_production_change: false
    automatic_permission_change: false
