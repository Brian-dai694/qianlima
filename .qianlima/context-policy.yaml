context_policy:
  version: 1
  purpose: Control how agents read, compress, and carry file context safely.
  model_adapter_file: model-adapters.yaml

  principle:
    - Never assume the model can read every file in full.
    - Always keep safety reserve for reasoning, tool results, and final answer.
    - Prefer source references over copying full files into context.
    - Preserve source of truth in files; compress only working context.

  model_context_budget:
    mode: configurable
    notes: Do not hard-code vendor-specific maximum context windows.
    usable_context_ratio: 0.70
    safety_reserve_ratio: 0.30
    warning_threshold_ratio: 0.60
    stop_threshold_ratio: 0.85

  default_budget_tokens:
    total_window: 128000
    usable_context: 89600
    safety_reserve: 38400
    warning_threshold: 76800
    stop_threshold: 108800

  adapter_resolution:
    order:
      - explicit_workflow_model
      - user_selected_model
      - provider_default
      - generic_capability_class
      - conservative_defaults
    fallback_profile: defaults
    deepseek_default_profile: deepseek-v4-flash
    deepseek_reasoning_profile: deepseek-v4-pro

  provider_notes:
    deepseek:
      official_context_length_tokens: 1000000
      official_max_output_tokens: 384000
      use_staged_summary_even_with_1m_context: true
      recommended_reserve:
        flash: 0.45
        pro: 0.50
      cache_hint: Keep stable prefixes unchanged to benefit from context caching.

  file_reading_limits:
    direct_read:
      max_file_size_kb: 20
      max_files_per_turn: 5
      use_when: Small instructions, current workflow files, short templates.
    extract_then_read:
      max_file_size_kb: 200
      use_when: Medium documents with headings, tables, or repeated structure.
    summarize_first:
      max_file_size_kb: 2048
      use_when: Long docs, reports, transcripts, PDFs, exports, knowledge files.
    index_only:
      min_file_size_kb: 2048
      use_when: Very large files, datasets, logs, archives.

  compression_levels:
    - level: L0
      name: full_context
      description: Read full file into context.
      allowed_for: Small files only.
    - level: L1
      name: relevant_extract
      description: Extract only sections matching the current task.
      allowed_for: Medium files and targeted lookups.
    - level: L2
      name: structured_summary
      description: Summarize into goal, facts, decisions, risks, and next actions.
      allowed_for: Long docs and knowledge materials.
    - level: L3
      name: outline_index
      description: Keep table of contents, key entities, and file references only.
      allowed_for: Very large files and recurring references.
    - level: L4
      name: source_reference_only
      description: Keep path, metadata, and retrieval instructions only.
      allowed_for: Archives, raw data, and source files not needed immediately.

  auto_compression_triggers:
    - planned_context_ratio_above_warning_threshold
    - more_than_5_files_needed
    - any_file_above_direct_read_limit
    - repeated_reference_to_same_large_file
    - workflow_runs_longer_than_3_steps
    - user_provides_many_documents
    - conversation_history_blocks_current_task

  required_summary_schema:
    file_path: required
    source_type: required
    date_or_version: optional
    why_relevant: required
    key_facts: required
    decisions: optional
    risks: optional
    open_questions: optional
    action_items: optional
    source_sections: required
    confidence: required

  safety_rules:
    - Summaries must cite source file paths.
    - Summaries must not replace original files.
    - Financial, legal, medical, account, credential, and customer data must be summarized with extra caution.
    - Raw sensitive fields must not be copied into context unless explicitly needed and permitted.
    - If a conclusion depends on omitted content, mark it as pending verification.
    - Before high-risk action, reload the source section instead of relying only on summary.
    - Treat compression as a security-sensitive transformation; preserve constraints, risk rules, source sections, and open questions.
    - Before important decisions, check whether compression could have dropped, inverted, or over-weighted a critical fact.
    - Refusal rules, permission rules, and explicit user confirmations must be loaded directly when they control execution.

  compression_attack_defense:
    version: "v2.6.1"
    source: "COMA / Comattack compression attack threat model"
    rule_file: "rules/compression-attack-defense.md"
    applies_when:
      - "summarize_first is used"
      - "context is handed to another agent"
      - "conact_memory_folding is used"
      - "workflow output affects bid, budget, price, purchase, listing content, external send, or write-back"
    required_summary_fields:
      - source_path
      - source_sections
      - constraints_preserved
      - facts_omitted_or_uncertain
      - compression_level
      - confidence
      - source_reload_required
    adversarial_checks:
      - "Could compression remove a user constraint?"
      - "Could compression hide a forbidden operation?"
      - "Could compression suppress a negative fact or failed assumption?"
      - "Could compression make a low-confidence source look authoritative?"
    hard_blocks:
      - condition: "high_risk_action_from_summary_only"
        response: "reload_source_or_request_user_confirmation"
      - condition: "summary_without_source_sections"
        response: "block_decision_until_source_trace_exists"
      - condition: "risk_rules_or_permissions_only_seen_in_summary"
        response: "reload_risk_rules_directly"

  workflow_integration:
    preflight:
      - estimate_needed_context
      - load_world_model_prediction_when_available
      - load_conact_memory_fold_when_gui_or_long_task
      - classify_files_by_size_and_relevance
      - choose_compression_level
      - reserve_safety_budget
    execute:
      - read_small_files_directly
      - summarize_large_files_to_working
      - update_conact_memory_fold_for_gui_steps
      - pass_summary_manifest_between_agents
      - record_world_model_hit_or_miss_when_used
    verify:
      - check_summary_has_source_paths
      - check_summary_preserves_constraints
      - check_compression_attack_gates
      - reload_source_sections_for_high_risk_decisions
      - record_context_usage_in_trace

  # ═══════════════════════════════════════════════════════════════
  # v2 扩展: Context Engineering 2.0
  # 版本: v2.0 | 更新: 2026-07-08
  # 来源: Lilian Weng "Harness Engineering for Self-Improvement" (2026-07-04)
  # 理念: "Context is not just about what fits — it's about what matters."
  # ═══════════════════════════════════════════════════════════════

  v2_extensions:

    # ── 动态上下文分配 ──────────────────────────────────────────
    # v1 按文件大小静态分配 → v2 按任务类型动态分配
    dynamic_allocation:
      description: >
        不再仅按文件大小决定压缩级别，而是结合:
        - 任务阶段（启动/探索/执行/验证）
        - 内容类型（治理配置/原始数据/历史报告/知识文档）
        - 与当前场景的相关度
      
      task_phase_budget:
        bootstrap:
          description: "会话启动：加载治理文件"
          max_files: 12
          prefer: L0 (全量读，治理文件通常小)
          budget_fraction: 0.15  # 启动阶段最多占 15% 上下文
        
        exploration:
          description: "数据收集：关键词/广告/竞品查询"
          max_files: 8
          prefer: L1 (相关提取，只读需要的字段)
          budget_fraction: 0.30
        
        execution:
          description: "执行：生成报告/写入文件"
          max_files: 5
          prefer: L2 (结构化摘要，保留大图)
          budget_fraction: 0.25
        
        verification:
          description: "验证：交叉检查/门禁确认"
          max_files: 5
          prefer: L0-L1 (验证需要精确数据)
          budget_fraction: 0.15
        
        synthesis:
          description: "最终输出：汇总/回答"
          budget_fraction: 0.15  # 留给最终回答和用户交互

      content_type_priority:
        governance:    {priority: critical, compression: L0}
        raw_data:      {priority: high,     compression: L1}
        reports:       {priority: medium,   compression: L2}
        knowledge:     {priority: low,      compression: L3}
        archive:       {priority: minimal,  compression: L4}

    # ── 智能压缩选择器 ──────────────────────────────────────────
    smart_compressor:
      description: >
        不只按文件大小，还考虑内容稠密度:
        - 表格/数据: 行数 > 压缩阈值时保留表头+摘要行
        - YAML 配置: 保留与当前场景相关的段
        - Markdown 长文: 保留标题层级 + 当前场景段落
        - 日志: 保留最晚 N 条 + 错误条目
      
      content_aware_rules:
        - type: tabular
          detect: ".csv, .xlsx, 飞书表格导出"
          strategy: "保留表头 + 最近 30 行 + 汇总统计"
        - type: config
          detect: ".yaml, .toml, .json 配置"
          strategy: "保留与 work.ws 中 active scenarios 相关的段"
        - type: prose
          detect: ".md, .txt 长文"
          strategy: "保留标题层级 + first 200 chars of relevant sections"
        - type: log
          detect: ".log, run-traces/"
          strategy: "保留 last 50 lines + 所有 ERROR/WARN 行"

    # ── ConAct 记忆折叠 ───────────────────────────────────────
    # 来源: MemGUI-Agent — Context-as-Action
    # 理念: "Treat context management as part of the agent action."
    conact_memory_folding:
      version: "1.0"
      source: "SOTA MemGUI-Agent / ConAct"
      applies_when:
        - "workflow 涉及 Kimi WebBridge、Chrome DevTools MCP、OfficeCLI 预览或其他 GUI/网页操作"
        - "单个任务步骤数 > 8"
        - "同一页面、同一系统或同一文件被反复操作"
        - "用户要求长周期巡检、录入、改文档、跑报表或跨页面排查"

      purpose: >
        把上下文管理作为每一步动作的一部分。
        Agent 每执行一段 GUI/网页/外部系统操作后，不保留完整流水账，
        而是维护三块稳定记忆：折叠动作历史、折叠界面状态、最近步骤记录。

      memory_fields:
        folded_action_history:
          description: "压缩后的历史动作，只保留目标、关键点击/输入、数据来源和决策点。"
          keep:
            - "用户目标和当前 workflow_id"
            - "已访问的系统、页面、文档或文件"
            - "已完成的关键动作"
            - "已确认或被推翻的假设"
            - "失败动作及原因"
          drop:
            - "重复导航"
            - "无信息量截图描述"
            - "临时 hover、滚动、等待"
            - "已被后续步骤覆盖的中间观察"

        folded_ui_state:
          description: "当前可继续操作的界面/文档状态。"
          keep:
            - "当前页面/文件/工作表/幻灯片/文档路径"
            - "当前位置或选中对象"
            - "关键可见字段及其值"
            - "未保存变更、弹窗、筛选器、登录状态"
            - "下一步可行动作入口"
          confidence: "low | medium | high"

        recent_step_record:
          description: "最近 3-5 步原始记录，用来防止折叠过度。"
          max_steps: 5
          keep:
            - "step_id"
            - "tool_or_ui_action"
            - "observation"
            - "result"
            - "next_intent"

      storage:
        transient: "working/conact-state-{workflow_id}-{date}.yaml"
        durable_when_useful: "context-summaries/conact-{workflow_id}-{date}.md"
        feedback_when_failed: "feedback/conact-miss-{workflow_id}-{date}.md"

      update_rules:
        after_each_gui_action:
          - "把新观察合并进 folded_ui_state"
          - "把低价值步骤从 recent_step_record 折叠进 folded_action_history"
          - "如果当前 UI 状态与历史矛盾，标记 conflict 并优先相信最新观察"
        before_context_compression:
          - "保留 folded_action_history 和 folded_ui_state"
          - "recent_step_record 最多保留 5 步"
          - "如果步骤涉及高风险动作，保留原始证据路径，不只保留摘要"
        before_handoff_or_subagent:
          - "传递三字段摘要，而不是完整浏览器流水账"
          - "明确 pending_actions、blocked_reason 和 verification_needed"

      safety_rules:
        - "ConAct 折叠是操作记忆，不是事实来源。正式结论仍需引用数据源或文件。"
        - "涉及竞价、预算、价格、采购、删除、写回外部系统时，不得只依赖 folded_ui_state。"
        - "登录态、token、cookie、个人信息不得写入折叠记忆；只记录 '已登录/未登录/权限不足'。"
        - "截图中出现敏感字段时，只记录脱敏摘要。"

      quality_checks:
        - check: "resume_ready"
          description: "另一个 Agent 只读三字段摘要，能否知道下一步该做什么。"
        - check: "evidence_traceable"
          description: "所有关键事实是否能追溯到文件、数据源、截图或用户确认。"
        - check: "no_secret_leakage"
          description: "折叠记忆中不得出现 token、cookie、密码、API key。"
        - check: "recent_steps_not_overlong"
          description: "recent_step_record 不超过 5 步。"

    # ── 深度模型适配 ──────────────────────────────────────────
    deep_model_adaptation:
      description: >
        与 model-adapters.yaml 深度耦合，根据实际运行模型动态调整。
        不同模型有不同的上下文退化曲线和压缩偏好。
      
      model_specific_policies:
        deepseek-v4-pro:
          context_window: 1000000
          usable_ratio: 0.50
          compression: staged          # 1M 窗口仍需分阶段摘要
          summary_after_lines: 3000    # 上下文超过此值开始压缩
          cache_strategy: "prefix_stable"  # 保持前缀稳定以利用缓存
          note: "Pro 模式用 thinking tokens，预留 15% 给推理"

        deepseek-v4-flash:
          context_window: 1000000
          usable_ratio: 0.55
          compression: staged
          summary_after_lines: 4000
          cache_strategy: "prefix_stable"
          note: "Flash 没有 thinking tokens，可用上下文更多"

      fallback: "未知模型用 v1 的 conservative_defaults"

    # ── 上下文预算实时监控 ──────────────────────────────────────
    runtime_monitoring:
      description: >
        不再是事后的 "token 用量统计"，而是实时的上下文预算追踪。
        Agent 在每个关键步骤后检查预算使用情况。
      
      checkpoints:
        - after_bootstrap: "检查治理文件加载后的上下文占用"
        - after_data_fetch: "检查数据提取后的占用，决定是否需要压缩"
        - before_report_gen: "确保留有足够空间给报告生成"
        - before_final_answer: "确保留有足够空间给最终输出"

      budget_tracker_fields:
        - estimated_tokens_used
        - estimated_tokens_remaining
        - safety_reserve_remaining
        - compression_level_used
        - files_in_context_count
        - files_summarized_count
        - warnings_triggered

      auto_actions:
        - if: "预算使用 > 60% 且还没到 exploration 阶段结束"
          action: "将 non-critical 文件降级到 L3 压缩"
        - if: "预算使用 > 80%"
          action: "暂停加载新文件，先完成当前阶段的合成"
        - if: "安全预留 < 5000 tokens"
          action: "触发紧急压缩，输出当前状态摘要，停止新操作"

    # ── 上下文策略进化 ──────────────────────────────────────────
    context_evolution:
      description: >
        上下文策略本身也可以被改进（与 improvement-loop.yaml 联动）。
        追踪哪些压缩策略产生了好的效果，哪些导致了问题。
      
      metrics_to_track:
        - "压缩后是否仍需重新加载原始文件？（= 压缩太激进）"
        - "压缩后 Agent 是否做出了错误判断？（= 丢失了关键信息）"
        - "压缩节省了多少 tokens？（= 压缩效率）"
      
      feedback_to_improvement_loop:
        trigger: "如果同一文件被重复重新加载 > 2 次"
        action: "提高该文件的压缩级别保留度"
        trigger: "如果压缩后 Agent 判断失误"
        action: "标记该文件类型为 '需要更保守的压缩'"
