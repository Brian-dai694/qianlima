# file-registry.yaml - public file registry template
# This registry only lists files that belong to the public Qianlima template.

files:

  - file_id: readme
    path: README.md
    display_name: Project README
    scenario: all
    file_type: reference
    can_overwrite: true
    retention: keep

  - file_id: agents_rules
    path: AGENTS.md
    display_name: Agent startup rules
    scenario: all
    file_type: startup
    can_overwrite: true
    retention: keep

  - file_id: ai_start_here
    path: AI_START_HERE.md
    display_name: AI startup entry
    scenario: all
    file_type: startup
    can_overwrite: true
    retention: keep

  - file_id: start_script
    path: start-qianlima.ps1
    display_name: Qianlima startup script
    scenario: all
    file_type: script
    can_overwrite: true
    retention: keep

  - file_id: startup_index_md
    path: .qianlima/WORKSPACE_INDEX.md
    display_name: Generated workspace index
    scenario: all
    file_type: generated_index
    generated_by: bootstrap_qianlima
    can_overwrite: true
    retention: generated

  - file_id: startup_index_json
    path: .qianlima/workspace-index.json
    display_name: Generated machine index
    scenario: all
    file_type: generated_index
    generated_by: bootstrap_qianlima
    can_overwrite: true
    retention: generated

