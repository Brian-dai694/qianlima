# file-registry.yaml — 文件注册表
# 版本: v1.1 | 创建: 2026-06-23 | 更新: 2026-06-23
# 记录所有重要文件的位置、用途、来源和调用关系。
#
# 路径约定：本仓库根目录即「千里马计划」文件夹。
#   - files[].path 一律相对仓库根目录，不带 `千里马计划/` 前缀。
#   - external_references[] 为父级 Work Space 的运营文件，不在本仓库内（present: false），
#     仅作上下文登记，Agent 不应把它们当作本仓库可读文件。

files:

  # ── 千里马计划设计文档（仓库根目录） ──

  - file_id: qianlima_readme
    path: README.md
    display_name: 千里马计划文档索引
    scenario: all
    file_type: reference
    description: 文档索引、阅读顺序、依赖关系
    can_overwrite: true
    retention: keep

  - file_id: qianlima_governance
    path: Work Scenario Governance Spec 工作场景治理标准.md
    display_name: 工作场景治理标准
    scenario: all
    file_type: reference
    description: 治理中枢权威定义（时间/场景/workflow/权限/成本/跨场景/运行时保障）
    can_overwrite: true
    retention: keep

  - file_id: qianlima_harness
    path: Harness 千里马计划 MVP 数据上下文层与广告运营日报 Agent.md
    display_name: Harness MVP 架构
    scenario: all
    file_type: reference
    description: 七层能力模型 + 广告日报 Agent 设计
    can_overwrite: true
    retention: keep

  - file_id: qianlima_dataconnector
