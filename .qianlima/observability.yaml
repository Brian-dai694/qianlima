observability:
  version: "v2.7.0"
  purpose: Track workflow components, experience, decisions, files, cost, savings, and cost aggregation.
  principle: Cost visibility and savings are central runtime signals, not after-run bookkeeping.
  changes:
    v2_7_0:
      - "cost_observability: 新增 baseline_cost_usd（必填）、tier（必填）、method（estimated|measured|modeled）"
      - "realtime_cost_card: required_for 扩展为 every_workflow_completion"
      - "新增 cost_aggregation 维度：周累计 / 月累计 / 相比基线累计节约 / 聚合仪表盘"

dimensions:
  component_observability:
    description: Track whether each workflow component worked.
    metrics:
      - workflow_started
      - workflow_completed
      - data_source_available
      - required_fields_present
      - report_generated
      - trace_generated
      - usage_record_generated

  experience_observability:
    description: Track reusable lessons from user feedback and repeated runs.
    metrics:
      - user_edits_count
      - accepted_suggestions_count
      - rejected_suggestions_count
      - repeated_issue_count
      - template_change_count
      - rule_change_count

  decision_observability:
    description: Track whether recommendations have visible evidence.
    metrics:
      - recommendations_with_data_source
      - recommendations_with_rule_id
      - recommendations_with_risk_level
      - recommendations_requiring_confirmation

  file_observability:
    description: Track source files, generated files, and cross-file calls.
    metrics:
      - source_files_registered
      - output_files_registered
      - templates_used
      - overwrite_attempts

  cost_observability:
    description: Track model, tool, workflow cost, savings, and cost aggregation dashboard in real time.
    metrics:
      - model_calls
      - input_tokens
      - output_tokens
      - tool_calls
      - rows_read
      - tier                            # 🆕 v2.7.0: L0/L1/L2/L3 模型路由等级
      - method                          # 🆕 v2.7.0: estimated | measured | modeled（来自 Cage 设计模式）
      - estimated_cost_usd
      - baseline_cost_usd              # 🔴 必填
      - estimated_savings_usd
      - estimated_savings_rate_pct
      - cost_limit_usd
      - cost_status
      - savings_source
      - continue_or_stop_recommendation

  realtime_cost_card:
    description: User-visible compact cost and savings summary.
    template: templates/realtime-cost-card_template.md
    generator: scripts/new-cost-card.ps1
    aggregator: scripts/new-cost-aggregation.ps1   # 🆕 v2.7.0
    required_for:
      - every_non_trivial_workflow
      - every_workflow_completion                  # 🆕 v2.7.0: 所有非 trivial workflow 完成时必须输出
      - before_expensive_tool_calls
      - before_multi_file_summarization
      - before_high_risk_or_high_cost_actions
    fields:
      - current_estimated_cost_usd
      - cost_limit_usd
      - tier                                        # 🆕 v2.7.0
      - method                                      # 🆕 v2.7.0: estimated | measured | modeled
      - baseline_cost_usd
      - estimated_savings_usd
      - estimated_savings_rate_pct
      - cumulative_weekly_cost_usd                  # 🆕 v2.7.0
      - primary_savings_source
      - continue_or_stop

  context_observability:
    description: Track context usage, compression level, safety reserve, and ConAct folding.
    metrics:
      - estimated_context_tokens
      - context_budget_ratio
      - safety_reserve_tokens
      - files_read_full
      - files_summarized
      - files_indexed
      - compression_level_used
      - source_reload_count
      - conact_folding_triggered      # 🆕 v2.7.0
      - conact_folded_tokens_saved    # 🆕 v2.7.0

  latency_observability:
    description: Attribute task delay so optimization targets the actual bottleneck.
    metrics:
      - startup_ms
      - routing_ms
      - context_load_ms
      - tool_ms
      - model_ms
      - first_useful_output_ms
      - total_duration_seconds

  runtime_observability:
    description: Track budget, sandbox, and state-machine enforcement for each task run.
    metrics:
      - context_level
      - current_state
      - budget_exhaustion_reason
      - tool_budget_ratio
      - step_budget_ratio
      - sandbox_denial_count
      - confirmation_wait_count

  model_observability:
    description: Track provider-specific model behavior and adapter choice.
    metrics:
      - provider
      - model
      - adapter_profile
      - total_window_tokens
      - max_output_tokens
      - cache_hit_tokens
      - cache_miss_tokens
      - reasoning_mode_enabled
      - reserve_ratio_used

  # ── 🆕 v2.7.0: 成本聚合维度 ─────────────────────────────────

  cost_aggregation:
    description: Aggregate cost stats across all usage-ledger records.
    generator: scripts/new-cost-aggregation.ps1
    frequency: weekly
    output_path: "reports/cost-aggregation-{date}.md"
    metrics:
      - total_cost_this_week_usd
      - total_cost_this_month_usd
      - total_savings_vs_baseline_usd
      - savings_rate_this_week_pct
      - cost_by_workflow
      - cost_by_tier
      - top_cost_driver
      - anomaly_runs
      - trend_30d
    alert_thresholds:
      weekly_cost_exceeds_budget: "阻断并提示用户"
      single_run_cost_2x_baseline: "阻断并等待用户确认"

default_trace_fields:
  - run_id
  - workflow_id
  - scenario
  - tier                              # 🆕 v2.7.0
  - data_sources
  - source_files
  - output_files
  - rules_applied
  - decisions
  - confirmations_required
  - validation_result
  - usage_summary
  - realtime_cost_card
  - savings_summary
  - cost_aggregation_summary          # 🆕 v2.7.0
  - context_budget_summary
  - model_adapter_summary
  - latency_summary
  - runtime_policy_summary
  - status
