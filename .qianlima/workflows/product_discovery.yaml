workflow:
  id: product_discovery
  name: 新品机会探索
  scenario: product_selection
  status: draft
  mode: on_demand
  description: Evaluate a product concept or category using market, competition, profit, and risk evidence without creating products or purchase orders.

  communication_protocol:
    policy_file: communication-protocol.yaml
    default_context_level: L2_summary_manifest
    scenario_ref: scenario:product_selection
    required_refs:
      - file_ref
      - data_ref
      - summary_ref
    creates_refs:
      - run_ref
      - file_ref
      - summary_ref
    handoff_rules:
      - pass_source_materials_by_ref
      - mark_unverified_fields
      - preserve_public_safe_outputs
    output_rules:
      - cite_loaded_refs
      - register_report_in_file_registry
      - record_usage_ledger

  user_intents:
    - 帮我找新品
    - 看看这个品类能不能做
    - 做一个选品分析

  reads:
    - task-cards/product-discovery.yaml
    - templates/product-discovery_template.md
    - data-sources.yaml
    - file-registry.yaml
    - risk-rules.yaml
    - communication-protocol.yaml

  writes:
    - reports/{date}_新品机会_{marketplace}_V{version}.md
    - logs/{date}_product_discovery_trace.json
    - context-summaries/{date}_product_discovery_summary.yaml
    - usage-ledger/{date}_product_discovery_usage.yaml

  updates:
    - file-registry.yaml
    - work.ws

  required_inputs:
    - product_concept_or_keyword
    - marketplace

  optional_inputs:
    - target_profit_rate
    - budget
    - supplier_cost
    - competitor_asins
    - source_files

  execution:
    mode: single
    steps:
      - order: 1
        agent: data_agent
        action: collect_source_refs
        description: Resolve user-provided inputs, registered files, and allowed data sources.
      - order: 2
        agent: data_agent
        action: normalize_evidence
        description: Convert source material into a small evidence table with missing fields marked.
      - order: 3
        agent: analysis_agent
        action: evaluate_against_task_card
        description: Apply the task card checklist and identify risks, opportunities, and assumptions.
      - order: 4
        agent: execution_agent
        action: generate_report
        description: Render the public-safe markdown report from the template.
      - order: 5
        agent: audit_agent
        action: final_check
        description: Verify source citations, usage record, risk labels, and forbidden operations.

  validation:
    required_checks:
      - market_overview_present
      - competitor_structure_present
      - profit_space_present
      - risk_section_present
      - entry_recommendation_present
      - next_validation_steps_present
      - source_citation_present
      - usage_record_created

  permissions:
    allowed:
      - read_data_sources
      - aggregate
      - generate_report
      - write_local_file
    requires_confirmation:
      - overwrite_existing_report
      - send_external
      - write_back
    forbidden:
      - create_product
      - purchase_order
      - change_price
      - write_back

  risk_policy:
    default_risk_level: medium
    confirmation_required_for:
      - send_external
      - write_back
    source_reload_required_for:
      - financial_decision
      - high_risk_recommendation

  trace:
    must_log:
      - loaded_refs
      - assumptions
      - missing_fields
      - source_citations
      - risk_checks
      - token_usage
      - verification_gates
