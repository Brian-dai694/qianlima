workflow:
  id: profit_check
  name: 利润测算
  scenario: profit_review
  status: draft
  mode: on_demand
  description: Estimate product margin with explicit assumptions, sensitivity checks, and source reload before financial decisions.

  communication_protocol:
    policy_file: communication-protocol.yaml
    default_context_level: L2_summary_manifest
    scenario_ref: scenario:profit_review
    required_refs:
      - file_ref
      - data_ref
      - summary_ref
    creates_refs:
      - run_ref
      - file_ref
      - summary_ref
    handoff_rules:
      - pass_source_materials_by_ref
      - mark_unverified_fields
      - preserve_public_safe_outputs
    output_rules:
      - cite_loaded_refs
      - register_report_in_file_registry
      - record_usage_ledger

  user_intents:
    - 帮我算利润
    - 这个产品赚不赚钱
    - 算一下采购和售价空间

  reads:
    - task-cards/profit-check.yaml
    - templates/profit-check_template.md
    - data-sources.yaml
    - file-registry.yaml
    - risk-rules.yaml
    - communication-protocol.yaml

  writes:
    - reports/{date}_利润测算_{marketplace}_V{version}.md
    - logs/{date}_profit_check_trace.json
    - context-summaries/{date}_profit_check_summary.yaml
    - usage-ledger/{date}_profit_check_usage.yaml

  updates:
    - file-registry.yaml
    - work.ws

  required_inputs:
    - product_or_asin
    - marketplace

  optional_inputs:
    - target_price
    - supplier_cost
    - fba_fee
    - dimensions_weight
    - ad_cost_rate
    - return_rate

  execution:
    mode: single
    steps:
      - order: 1
        agent: data_agent
        action: collect_source_refs
        description: Resolve user-provided inputs, registered files, and allowed data sources.
      - order: 2
        agent: data_agent
        action: normalize_evidence
        description: Convert source material into a small evidence table with missing fields marked.
      - order: 3
        agent: analysis_agent
        action: evaluate_against_task_card
        description: Apply the task card checklist and identify risks, opportunities, and assumptions.
      - order: 4
        agent: execution_agent
        action: generate_report
        description: Render the public-safe markdown report from the template.
      - order: 5
        agent: audit_agent
        action: final_check
        description: Verify source citations, usage record, risk labels, and forbidden operations.

  validation:
    required_checks:
      - assumptions_are_listed
      - cost_table_present
      - profit_rate_calculated
      - sensitivity_checks_present
      - pending_verification_present
      - financial_sources_cited
      - usage_record_created

  permissions:
    allowed:
      - read_data_sources
      - aggregate
      - generate_report
      - write_local_file
    requires_confirmation:
      - overwrite_existing_report
      - send_external
      - write_back
    forbidden:
      - purchase_order
      - change_price
      - write_back
      - send_external

  risk_policy:
    default_risk_level: high
    confirmation_required_for:
      - send_external
      - write_back
    source_reload_required_for:
      - financial_decision
      - high_risk_recommendation

  trace:
    must_log:
      - loaded_refs
      - assumptions
      - missing_fields
      - source_citations
      - risk_checks
      - token_usage
      - verification_gates
