workflow:
  id: listing_optimization
  name: Listing 优化诊断
  scenario: product_selection
  status: draft
  mode: on_demand
  description: Diagnose title, bullets, keywords, images, and conversion issues without uploading changes to Amazon.

  communication_protocol:
    policy_file: communication-protocol.yaml
    default_context_level: L2_summary_manifest
    scenario_ref: scenario:product_selection
    required_refs:
      - file_ref
      - data_ref
      - summary_ref
    creates_refs:
      - run_ref
      - file_ref
      - summary_ref
    handoff_rules:
      - pass_source_materials_by_ref
      - mark_unverified_fields
      - preserve_public_safe_outputs
    output_rules:
      - cite_loaded_refs
      - register_report_in_file_registry
      - record_usage_ledger

  user_intents:
    - 帮我优化 Listing
    - 诊断这个 ASIN
    - 看看标题五点怎么改

  reads:
    - task-cards/listing-optimization.yaml
    - templates/listing-optimization_template.md
    - data-sources.yaml
    - file-registry.yaml
    - risk-rules.yaml
    - communication-protocol.yaml

  writes:
    - reports/{date}_Listing优化_{marketplace}_V{version}.md
    - logs/{date}_listing_optimization_trace.json
    - context-summaries/{date}_listing_optimization_summary.yaml
    - usage-ledger/{date}_listing_optimization_usage.yaml

  updates:
    - file-registry.yaml
    - work.ws

  required_inputs:
    - asin
    - marketplace

  optional_inputs:
    - current_listing_copy
    - target_keywords
    - competitor_asins
    - source_files

  execution:
    mode: single
    steps:
      - order: 1
        agent: data_agent
        action: collect_source_refs
        description: Resolve user-provided inputs, registered files, and allowed data sources.
      - order: 2
        agent: data_agent
        action: normalize_evidence
        description: Convert source material into a small evidence table with missing fields marked.
      - order: 3
        agent: analysis_agent
        action: evaluate_against_task_card
        description: Apply the task card checklist and identify risks, opportunities, and assumptions.
      - order: 4
        agent: execution_agent
        action: generate_report
        description: Render the public-safe markdown report from the template.
      - order: 5
        agent: audit_agent
        action: final_check
        description: Verify source citations, usage record, risk labels, and forbidden operations.

  validation:
    required_checks:
      - report_has_current_issues
      - report_has_keyword_opportunities
      - report_has_title_suggestions
      - report_has_bullet_suggestions
      - report_has_priority_labels
      - report_has_no_backend_upload
      - report_has_source_citation
      - usage_record_created

  permissions:
    allowed:
      - read_data_sources
      - aggregate
      - generate_report
      - write_local_file
    requires_confirmation:
      - overwrite_existing_report
      - send_external
      - write_back
    forbidden:
      - update_listing
      - upload_backend
      - change_price
      - write_back

  risk_policy:
    default_risk_level: medium
    confirmation_required_for:
      - send_external
      - write_back
    source_reload_required_for:
      - financial_decision
      - high_risk_recommendation

  trace:
    must_log:
      - loaded_refs
      - assumptions
      - missing_fields
      - source_citations
      - risk_checks
      - token_usage
      - verification_gates
