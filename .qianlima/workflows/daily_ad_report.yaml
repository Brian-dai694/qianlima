# daily_ad_report.yaml — 每日广告运营日报 Workflow
# 版本: v3.0 | 更新: 2026-07-08
# 变更: 嵌入 EVR Loop（Execute→Verify→Refine），从线性 8 步升级为反馈回路

workflow:
  id: daily_ad_report
  name: 每日广告运营日报
  scenario: ad_ops
  status: draft
  description: 每天读取昨日广告数据，计算核心指标，识别异常，生成结构化日报

  runtime_policy:
    source: agent-runtime-policy.yaml
    context_level: L3
    budget_profile: default_budgets
    state_machine: agent_runtime_policy.state_machine
    first_delivery: status_card_then_preliminary_judgment

  subagent_plan:
    source: subagent-orchestration.yaml
    pattern: build_verify_pair
    budget:
      max_children: 3
      max_concurrent: 2
    stages:
      - id: fetch_ad_data
        role: explore
        permissions: [read_data_sources]
        output: normalized_ad_data_summary
      - id: generate_report
        role: maker
        maps_to: implementer
        input_from: fetch_ad_data
        permissions: [write_local_report]
        output: report_draft
      - id: verify_report
        role: checker
        maps_to: verifier
        input_from: report_draft
        context_isolation: required
        permissions: [read_report, read_source_summary]
        output: verification_result
    parent_rules:
      - "Only the parent can mark the workflow completed."
      - "Checker cannot perform report writes or external actions."
      - "A failed checker result returns the draft to the maker or freezes the run."

  schedule:
    type: daily
    time: "09:30"
    timezone: Asia/Shanghai
    auto_run: false
    requires_confirmation: true

  # ── 用户自然语言触发 ──
  user_intents:
    - 生成广告日报
    - 用今天的广告数据生成报告
    - 检查昨天广告表现
    - 跑一下广告日报

  # ── 输入 ──
  inputs:
    data_sources:
      - source_id: lark_ads_daily
        role: ad_performance
        required: true
      - source_id: lingsing_ads
        role: ad_performance_realtime
        required: false
    parameters:
      - name: date
        type: date
        default: yesterday
        description: 数据日期
      - name: marketplace
        type: enum
        default: US

  # ── 执行步骤 ──
  execution:
    mode: single
    steps:
      - order: 1
        agent: data_agent
        action: read_ad_data
        source: lark_ads_daily
        description: 读取昨日广告数据（飞书 Ad Daily 表）
      - order: 2
        agent: data_agent
        action: read_sales_data
        source: lingsing_ads
        description: 读取领星广告仪表盘实时数据（交叉验证）
        optional: true
      - order: 3
        agent: data_agent
        action: validate_data
        description: 检查数据质量（必填字段、日期范围、数字字段有效性）
      - order: 4
        agent: analysis_agent
        action: calculate_metrics
        description: 计算 ACoS / CPC / CTR / CVR / TACoS
      - order: 5
        agent: analysis_agent
        action: apply_diagnostic_rules
        description: 应用 5 条诊断规则，标记异常和机会
      - order: 6
        agent: execution_agent
        action: generate_report
        description: 按模板生成 Markdown 日报
      - order: 7
        agent: audit_agent
        action: verify_report
        description: 验证指标准确性、来源引用、风险标注
      - order: 8
        agent: execution_agent
        action: record_usage
        description: 记录 Token / 工具调用 / 成本到 usage-ledger

  # ── 指标计算 ──
  metrics:
    - id: spend
      name: 广告花费
      formula: sum(spend)
      unit: USD
    - id: sales
      name: 广告销售额
      formula: sum(sales)
      unit: USD
    - id: orders
      name: 广告订单数
      formula: sum(orders)
    - id: acos
      name: ACoS
      formula: spend / sales
      empty_when: sales = 0
      unit: "%"
    - id: cpc
      name: CPC
      formula: spend / clicks
      empty_when: clicks = 0
      unit: USD
    - id: ctr
      name: CTR
      formula: clicks / impressions
      empty_when: impressions = 0
      unit: "%"
    - id: cvr
      name: CVR
      formula: orders / clicks
      empty_when: clicks = 0
      unit: "%"
    - id: tacos
      name: TACoS
      formula: spend / total_sales
      empty_when: total_sales = 0
      unit: "%"

  # ── 诊断规则 ──
  diagnostic_rules:
    - id: high_spend_no_order
      name: 高花费无单
      condition: spend >= 10 AND orders = 0
      severity: high
      suggestion: 降低竞价或暂停观察，检查 listing 转化
    - id: high_acos
      name: ACoS 过高
      condition: acos > target_acos * 1.3 AND orders >= 1
      severity: medium
      suggestion: 降低竞价 10%-20%，检查关键词相关性
    - id: excellent_performance
      name: 表现优秀
      condition: acos <= target_acos AND orders >= 2
      severity: positive
      suggestion: 保留或小幅加预算，观察排名变化
    - id: high_click_low_conversion
      name: 高点击低转化
      condition: clicks >= 15 AND (orders = 0 OR cvr < 0.5)
      severity: medium
      suggestion: 检查主图、价格、Review、Coupon、页面转化
    - id: low_impression
      name: 低曝光
      condition: impressions < 100 AND spend < 5
      severity: low
      suggestion: 检查竞价、预算、关键词搜索量

  # ── 输出 ──
  outputs:
    primary:
      format: markdown
      template: templates/广告运营_日报模板.md
      path: reports/{date}_广告运营_日报_{marketplace}_V{version}.md
    auxiliary:
      - format: json
        path: logs/{date}_daily_ad_report_trace.json
      - format: jsonl
        path: usage-ledger/runs.jsonl
        write_mode: append_only

  # ── 质量门 ──
  quality_gates:
    - check: required_fields_exist
      description: 日报必须包含花费、销售额、订单、ACoS
    - check: date_range_correct
      description: 日期必须是目标日期
    - check: total_spend_matches
      description: 日报总花费与原始数据汇总一致
    - check: no_empty_conclusion
      description: 必须至少有一条诊断结论
    - check: source_cited
      description: 必须标明数据来源和日期范围
    - check: cost_record_created
      description: 必须记录本次运行的 Token 使用和成本

  # ── 权限 ──
  permissions:
    allowed:
      - read_data_sources
      - generate_report
      - write_local_file
    requires_confirmation:
      - send_to_lark_group
      - sync_to_lark_sheet
      - overwrite_existing_report
    forbidden:
      - modify_ad_campaign
      - change_bid
      - change_budget
      - delete_source_data

  # ── 错误处理 ──
  error_handling:
    on_data_missing:
      action: report_partial
      user_message: "{date} 的广告数据暂时不可用，已用最近可用日期 {fallback_date} 的数据代替"
    on_data_empty:
      action: report_empty
      user_message: "{date} 暂无广告数据，请检查飞书 Ad Daily 表是否已更新"
    on_permission_denied:
      action: stop_and_ask
      user_message: "没有权限读取广告数据，请检查数据源授权"
    on_calculation_error:
      action: skip_and_note
      user_message: "部分指标因 sales 或 clicks 为 0 无法计算，已标注"

  # ── 文件操作 ──
  file_operations:
    reads:
      - data-sources.yaml
      - file-registry.yaml
      - inbox/*_ad-data_raw_*.csv
      - inbox/*_广告数据_原始_*.xlsx
      - templates/广告运营_日报模板.md
    writes:
      - reports/{date}_广告运营_日报_{marketplace}_V{version}.md
      - logs/{date}_daily_ad_report_trace.json
      - usage-ledger/runs.jsonl
    updates:
      - file-registry.yaml
      - work.ws

  # ── 追溯要求 ──
  trace:
    must_log:
      - data_sources_accessed
      - rows_read
      - diagnostic_rules_fired
      - token_usage
      - estimated_cost
      - duration_seconds

  # ── EVR Loop（v3.0 新增）────────────────────────────────────
  # 本 workflow 使用 Execute→Verify→Refine 循环。
  # 完整定义见 loop-engineering.yaml → loop_types.execute_verify_refine
  loop:
    type: EVR                              # Execute → Verify → Refine
    source: loop-engineering.yaml
    runner: scripts/invoke-qianlima-loop.ps1
    runner_mode: stateful_local_trace

    # 将原有 8 步映射到 EVR 阶段
    phases:
      - phase: execute
        order: 1
        description: "步骤 1-6: 读数据→校验→计算→诊断→生成报告"
        mapped_steps: [1, 2, 3, 4, 5, 6]
        agent_type: implementer
        checkpoint: "报告生成后自检：spend/sales/orders/acos 必填字段完整？"

      - phase: verify
        order: 2
        description: "步骤 7: 独立验证报告质量（建议用独立子代理）"
        mapped_steps: [7]
        agent_type: verifier
        checks:
          - "quality_gates 逐个检查"
          - "数据源标注完整性"
          - "跨源数据偏差 < 5%"
          - "诊断建议是否有数据支撑"
        output: "pass | fail_with_issues | fail_critical"

      - phase: refine
        order: 3
        description: "如果 verify=fail_with_issues: 精炼报告（补标注/修计算/补诊断）"
        condition: "verify 结果为 fail_with_issues"
        agent_type: implementer
        note: "局部修补，不全量重新生成。如果 fail_critical → 回到 execute"

      - phase: loop_check
        order: 4
        description: "refine 后仍有未解决问题 → 回到 verify"
        condition: "迭代次数 < 3 且无 critical 阻塞"

    convergence:
      target: "verify = pass，或 max_iterations 耗尽且无 critical"
      max_iterations: 3
      escalation: "连续 3 次 verify 不通过 → 标记 '需人工介入'"

    tracing:
      enabled: true
      metrics:
        - first_pass_rate
        - avg_refine_iterations
        - top_failure_reasons
        - verify_time_ratio
      output: "logs/loop-trace-daily_ad_report-{date}.json"

    adaptive:
      - parameter: max_iterations
        rule: "如果 first_pass_rate < 0.5，+1（上限 5）"
      - parameter: verify_agent_model
        rule: "如果 verify 漏检后续被用户发现 → 升级 verifier 模型"
