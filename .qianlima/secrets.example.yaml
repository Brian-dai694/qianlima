# secrets.example.yaml — 密钥模板
#
# 用法：
#   1. 复制本文件为同目录下的  secrets.local.yaml
#   2. 填入你的真实值
#   3. secrets.local.yaml 已被 .gitignore 忽略，不会进入版本库 / 不会上传 GitHub
#
# data-sources.yaml 中的 <LARK_SPREADSHEET_TOKEN> / <SHEET_ID> 等占位符，
# 运行时由 Agent 从 secrets.local.yaml 读取真实值替换。

lark:                       # 飞书
  spreadsheet_tokens:
    ad_daily:     "<填入飞书表格 token>"
    asin_sales:   "<填入飞书表格 token>"
    kw_log:       "<填入飞书表格 token>"
    product_list: "<填入飞书表格 token>"
  sheet_ids:
    ad_daily:     "<填入 sheet_id>"
    asin_sales:   "<填入 sheet_id>"
    kw_log:       "<填入 sheet_id>"

lingxing:                   # 领星 ERP（如需登录态，凭证放本地，勿提交）
  account: "<可选>"

# 业务敏感数据（财务目标、真实产品矩阵等）也建议放这里，不要写进公开的 work.ws
business:
  annual_targets: {}
  products: []
