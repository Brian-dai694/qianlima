# a2a-task-state.yaml - A2A-like task lifecycle for local Qianlima contracts
a2a_task_state:
  version: 1
  protocol_target: "A2A 1.0 semantics"
  mode: internal_contract_only
  external_state_mapping:
    pending: submitted
    assigned: submitted
    running: working
    awaiting_verification: working
    awaiting_confirmation: auth_required
    completed: completed
    failed: failed
    rejected: rejected
    cancelled: canceled
    partial: internal_only
    frozen: input_required_or_failed
  terminal_states: [completed, failed, rejected, cancelled]
  internal_terminal_states: [partial, frozen]
  invariants:
    terminal_task_immutable: true
    revision_rule: "A refinement creates a new task_id referencing the prior task and artifacts."
    context_isolation: "A task may read only artifacts explicitly referenced by its context and work order."
    manager_owns_final_status: true
    external_agent_cannot_grant_L4: true
  transitions:
    submitted: [working, rejected, canceled]
    working: [input_required, auth_required, completed, failed, canceled]
    input_required: [working, rejected, canceled]
    auth_required: [working, rejected, canceled]
    completed: []
    failed: []
    rejected: []
    canceled: []
