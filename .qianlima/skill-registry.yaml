# skill-registry.yaml — 千里马 Skill 注册表
# 版本: v1.1 | 创建: 2026-07-08 | 更新: 2026-07-09
# 来源: nemo-skills — 借鉴 NeMo Skills 的技能管理体系
# 理念: "Every task-card is a skill. Skills have triggers, scope, capabilities, and quality gates.
#         Skills can be composed. Skills can be audited."

skill_registry:
  id: qianlima_skills
  version: "1.0"
  principle: >
    Task-card 不只是"用户说了什么就做什么"的映射表——
    它是技能的完整定义：触发条件、能力边界、输入输出、约束和质量门禁。
    每个 skill 都可以被独立测试、审计和进化。

  natural_language_entry:
    source: ".qianlima/natural-language-router.yaml"
    principle: >
      普通用户不需要记 skill_id、workflow_id 或 MCP 名称。
      Agent 先用自然语言路由识别任务意图、输入对象、输出要求和风险动作，
      再选择本注册表中的 skill 或组合能力执行。
      每个用户任务默认先运行 auto_match_protocol：候选技能打分、置信度判断、
      必要参数检查、风险判断，然后决定直接执行、追问一句、规划路径或先确认。
    priority:
      - "业务 skill 优先于底层工具。"
      - "同一句话命中多个能力时，选择最贴近业务结果的 skill，工具只作为执行手段。"
      - "涉及写回、删除、调价、调预算、采购、发送外部消息时，必须按 risk-rules.yaml 确认。"
      - "低置信度匹配不得盲目执行；必须提出一个最关键澄清问题。"

  # ── Skill 定义标准 ──────────────────────────────────────────

  skill_schema:
    required_fields:
      - skill_id: "唯一标识符"
      - name: "人类可读名称"
      - description: "一句话说明这个 skill 做什么"
      - triggers: "用户说什么会触发这个 skill（自然语言模式列表）"
      - scope: "这个 skill 的边界——它做什么，不做什么"
      - capabilities: "具体的执行能力列表"
      - outputs: "产出物格式和路径"
      - constraints: "硬约束（不可绕过）"
      - quality_gates: "质量门禁列表"

    optional_fields:
      - requires_confirmation: "执行前是否需要用户确认"
      - estimated_tokens: "预估 token 消耗"
      - estimated_duration_min: "预估执行时间"
      - anti_rationalization: "预判 Agent 偷懒借口"
      - sub_skills: "依赖的子技能"
      - evolution_history: "技能自身的进化历史"

  # ── 已注册 Skill ────────────────────────────────────────────

  skills:

    - skill_id: skill_management
      name: "技能管理"
      description: "盘点、分组、健康检查和治理千里马可用的 skill、插件、MCP 与工具能力，并给出安装优先级"
      triggers:
        - "查看所有技能"
        - "管理技能"
        - "健康检查并分组"
        - "插件健康检查"
        - "哪些我能用"
        - "安装推荐优先级"
        - "P0 P1 P2 P3"
        - "这个工具要不要装"
      scope:
        does:
          - "读取千里马 skill-registry、natural-language-router、workflow-index 和必要启动文件"
          - "按业务价值、安装状态、风险、依赖和触发词分组"
          - "输出 P0/P1/P2/P3 安装或启用建议"
          - "区分 skill、workflow、MCP、插件、脚本和研究借鉴"
        does_not:
          - "未经确认安装外部包"
          - "未经确认修改 Codex/MCP 全局配置"
          - "删除或覆盖已有技能"
      capabilities:
        - "技能资产盘点"
        - "健康检查: 可用 / 待配置 / 不建议 / 研究观察"
        - "优先级排序: P0 必装实用, P1 高频增强, P2 可借鉴, P3 研究 backlog"
        - "自然语言触发词维护"
      outputs:
        - format: markdown
          path: "reports/{date}_技能管理盘点_V{version}.md when requested"
        - format: yaml
          path: ".qianlima/skill-registry.yaml when updating registry"
      constraints:
        - "只读盘点默认可直接执行；安装、删除、禁用、覆盖必须二次确认"
        - "不得输出或暴露 MCP 配置中的 API key、token、headers、私有 URL"
      quality_gates:
        - "技能和工具必须分类型列出"
        - "每项建议必须有用途、状态、优先级和风险说明"
        - "安装建议必须说明来源和回滚方式"
      estimated_tokens: 6000
      estimated_duration_min: 5

    - skill_id: skill_path_planning
      name: "技能路径自动规划"
      description: "把用户自然语言目标拆成可执行路径，自动选择 skill、workflow、MCP、数据源、验证门禁和输出格式"
      triggers:
        - "自动规划技能路径"
        - "这个任务该用哪些技能"
        - "帮我规划怎么做"
        - "自动选择技能"
        - "组合技能"
        - "拆成步骤执行"
        - "先做什么后做什么"
      scope:
        does:
          - "识别用户目标、输入对象、输出要求和风险动作"
          - "从 natural-language-router、skill-registry 和 workflow-index 中选择路径"
          - "规划 skill / workflow / MCP / 文件读取 / 验证门禁的执行顺序"
          - "低风险任务可在路径确认后直接执行"
        does_not:
          - "绕过业务 skill 直接调用底层工具做高风险动作"
          - "在缺少关键数据源时假装已完成验证"
          - "把研究 backlog 当作生产 workflow"
      capabilities:
        - "目标 → 技能路径映射"
        - "多技能组合编排"
        - "风险门禁插入"
        - "上下文读取计划: 启动包 → task-card/workflow → 数据源 → 验证"
      outputs:
        - format: markdown
          path: "reports/{date}_技能路径规划_{topic}_V{version}.md when requested"
        - format: inline_plan
          path: "conversation when short"
      constraints:
        - "单一明确任务不要过度规划，直接路由到业务 skill"
        - "跨系统、跨文件、跨技能、高风险任务必须先亮路径和假设"
        - "路径必须包含验证步骤和待确认项"
      quality_gates:
        - "路径中每个 skill/tool 都有用途"
        - "高风险动作已标注确认点"
        - "最终输出格式和位置明确"
      estimated_tokens: 5000
      estimated_duration_min: 3

    - skill_id: keyword_rank_scan
      name: "关键词排名扫描"
      description: "查询 ASIN 在核心关键词下的最新排名，标记变化趋势，识别暴跌和机会词"
      triggers:
        - "跑一下关键词排名"
        - "看看卡位"
        - "扫描关键词"
        - "排名巡检"
        - "今天的关键词"
      scope:
        does:
          - "查询 Sorftime MCP 获取排名数据"
          - "Pangolinfo 交叉验证"
          - "标记暴跌（↓≥15位）、上升（↑≥10位）、稳定"
          - "生成 kw-rank-scan-{date}.md 报告"
        does_not:
          - "修改广告竞价"
          - "自动写回后台"
          - "在没有交叉验证的情况下声称排名准确"
      capabilities:
        - "SDR Loop: Scan → Doubt → Reconcile"
        - "多数据源自动切换（Sorftime → Pangolinfo → Kimi WebBridge）"
        - "置信度标注（HIGH/MEDIUM/LOW/BLIND）"
      outputs:
        - format: markdown
          path: "kw-records/kw-rank-scan-{date}.md"
      constraints:
        - "不得在仅单源数据时宣称置信度 HIGH"
        - "数据盲区必须标注，不得伪装成全量覆盖"
        - "排名暴跌必须触发交叉验证"
      quality_gates:
        - "覆盖率 ≥ 78%"
        - "每个词标注数据源"
        - "大幅变动词有趋势箭头和可能原因"
      estimated_tokens: 8000
      estimated_duration_min: 3
      anti_rationalization: "见 task-cards/keyword-monitoring.yaml"

    - skill_id: daily_ad_report
      name: "每日广告运营日报"
      description: "读取广告数据，计算核心指标（ACoS/CPC/CTR/CVR/TACoS），识别异常活动，生成结构化日报"
      triggers:
        - "生成广告日报"
        - "广告数据报告"
        - "昨天广告表现"
        - "广告消耗"
      scope:
        does:
          - "读取领星/飞书广告数据"
          - "计算 8 项核心指标"
          - "应用 5 条诊断规则"
          - "生成日报 Markdown"
        does_not:
          - "修改广告活动"
          - "自动调竞价"
          - "自动加预算"
      capabilities:
        - "EVR Loop: Execute → Verify → Refine"
        - "跨源数据偏差检测（< 5%）"
        - "诊断建议标注数据支撑和风险等级"
      outputs:
        - format: markdown
          path: "reports/{date}_广告运营_日报_US_V{version}.md"
        - format: json
          path: "logs/{date}_daily_ad_report_trace.json"
      requires_confirmation: true
      estimated_tokens: 12000
      estimated_duration_min: 5

    - skill_id: competitor_comparison
      name: "竞品对比分析"
      description: "对比自身产品与竞品在排名、价格、评论、关键词覆盖等维度的差异，给出策略建议"
      triggers:
        - "竞品对比"
        - "看看对手"
        - "和 XX 比较"
        - "benchmark"
      scope:
        does:
          - "收集竞品 ASIN 核心数据"
          - "多维度对比分析"
          - "生成策略建议"
        does_not:
          - "修改自身 Listing"
          - "自动调价"
      capabilities:
        - "EDA Loop: Explore → Decide → Act"
        - "并行子代理收集多维数据"
        - "综合决策 + 置信度标注"
      outputs:
        - format: markdown
          path: "reports/{date}_竞品对比_US_V{version}.md"
      estimated_tokens: 15000
      estimated_duration_min: 8

    - skill_id: profit_check
      name: "利润测算"
      description: "基于成本结构、广告费、FBA 费等计算产品净利润率和盈亏平衡点"
      triggers:
        - "算利润"
        - "这个产品赚不赚钱"
        - "毛利"
        - "盈亏"
      scope:
        does:
          - "假设亮牌（汇率/佣金/FBA/退货率/广告占比）"
          - "逐项费用计算"
          - "敏感度分析（+2% 退货率 → 净利润变多少）"
        does_not:
          - "在假设未确认时输出确定性结论"
      capabilities:
        - "EVR Loop: Execute → Verify → Refine"
        - "Assumption Surfacing（6 维度亮牌）"
        - "What-if 场景分析"
      requires_confirmation: true
      constraints:
        - "所有假设必须逐条等待用户确认后才能计算"
      estimated_tokens: 6000
      estimated_duration_min: 3

    - skill_id: amazon_payment_reconciliation
      name: "亚马逊付款核账"
      description: "核对日期范围报告与付款周期报告，判断订单、Deferred、广告扣费和 Transfer 回款是否进入结算"
      triggers:
        - "亚马逊有没有漏结算"
        - "查亚马逊付款"
        - "日期范围报告和付款周期报告"
        - "标准订单和发票订单"
        - "Deferred 订单多久到账"
        - "广告扣费是否一致"
        - "Transfer 回款是否一致"
      scope:
        does:
          - "读取日期范围报告、标准订单付款周期报告、发票订单付款周期报告"
          - "按 月份 + order id 核对订单是否进入付款周期"
          - "统计 Deferred 订单从交易发生到 deposit-date 的延迟"
          - "按 settlement id + 日期 + 金额 核对 Cost of Advertising"
          - "按 Date Range Transfer 对 Payment Cycle total-amount 核对回款"
          - "输出 summary、missing_orders、deferred_delay、advertising_fee_audit、transfer_audit"
        does_not:
          - "把日期范围报告 total 和付款周期 total-amount 直接对比"
          - "在只提供标准订单付款报告时断言 Amazon 漏付款"
          - "写回 Amazon、ERP、银行或会计系统"
      capabilities:
        - "订单层核对: Date Range Order → Payment Cycle Order"
        - "发票订单覆盖: standard_order + invoiced_order 双来源"
        - "Deferred 延迟分析"
        - "广告扣费边界核对"
        - "Transfer 回款核对"
      outputs:
        - format: json
          path: "reports/amazon-payment-audit-{date}/summary.json"
        - format: csv
          path: "reports/amazon-payment-audit-{date}/*.csv"
        - format: xlsx
          path: "reports/amazon-payment-audit-{date}.xlsx when requested"
      constraints:
        - "不同报表口径必须先解释清楚：发生口径 vs 结算口径"
        - "未找到订单只作为数据覆盖缺口，不直接等同于未付款"
        - "必须说明是否包含发票订单付款周期报告"
        - "回款核对必须使用 Date Range 的 Transfer，不得使用普通 total 汇总"
      quality_gates:
        - "所有输入文件来源和日期范围已列出"
        - "订单、Deferred、广告费、Transfer 分表输出"
        - "remaining missing items 有原因和下一步检查建议"
      sub_skills:
        - "amazon-settlement"
      estimated_tokens: 9000
      estimated_duration_min: 20

    - skill_id: listing_optimization
      name: "Listing 优化诊断"
      description: "诊断 Listing 的标题/五点/搜索词/图片问题，给出符合 Amazon 规则的优化建议"
      triggers:
        - "优化 Listing"
        - "标题优化"
        - "五点描述"
        - "Search Terms"
      scope:
        does:
          - "诊断当前 Listing 问题"
          - "对比竞品 Listing"
          - "生成优化建议"
        does_not:
          - "直接修改 Amazon 后台"
      capabilities:
        - "PBV Loop: Plan → Build → Verify"
        - "符合 Amazon 7/27 新规检查"
        - "Search Terms 去重 + 长度验证"
      estimated_tokens: 10000
      estimated_duration_min: 6

    - skill_id: product_discovery
      name: "新品机会探索"
      description: "评估品类市场容量、竞争格局、利润空间，判断选品可行性"
      triggers:
        - "选品"
        - "这个品类能不能做"
        - "新品机会"
        - "市场分析"
      scope:
        does:
          - "市场容量估算"
          - "竞争格局分析"
          - "利润空间测算"
        does_not:
          - "代替实际下单和采购决策"
      capabilities:
        - "EDA Loop: Explore → Decide → Act"
        - "多维度信息并行收集"
        - "风险标注 + 替代方案"
      estimated_tokens: 20000
      estimated_duration_min: 10

    - skill_id: amazon_product_development
      name: "Amazon 产品开发"
      description: "把已批准的选品机会转成 PRD、规格矩阵、RFQ、样品测试计划和验收标准"
      triggers:
        - "产品开发"
        - "做 PRD"
        - "开发这个品"
        - "供应商怎么问"
        - "样品怎么验收"
        - "规格冲突怎么修"
        - "把选品转开发"
      scope:
        does:
          - "承接 opportunity_brief"
          - "输出 product_requirement_document"
          - "建立规格矩阵、RFQ 包和样品测试计划"
          - "识别规格、兼容、包装、售后和内容证据风险"
        does_not:
          - "重新替代选品市场判断"
          - "未经确认采购、付款或确认供应商"
          - "发布或修改 Amazon Listing"
      capabilities:
        - "机会 → PRD 转换"
        - "规格矩阵与冲突检查"
        - "RFQ 问题清单"
        - "样品验收门禁"
      outputs:
        - format: markdown
          path: "reports/{date}_产品开发_{asin_or_topic}_{marketplace}_V{version}.md when requested"
      constraints:
        - "规格冲突不能用总分抵消"
        - "不同产品形态不得混入同一 PRD"
        - "采购、打样付款和供应商确认必须人工确认"
      quality_gates:
        - "PRD 含规格、兼容、材料、包装、测试和证据计划"
        - "RFQ 基于同一规格矩阵"
        - "样品测试有可量化通过标准"
      sub_skills:
        - "amazon-product-development"
      estimated_tokens: 12000
      estimated_duration_min: 8

    - skill_id: amazon_seasonal_replenishment
      name: "Amazon 淡旺季补货"
      description: "根据销量、库存、在途、交期、季节性、现金和广告节奏生成补货计划"
      triggers:
        - "淡旺季补货"
        - "旺季前备货"
        - "库存还能撑多久"
        - "这个 ASIN 要补多少"
        - "断货风险"
        - "淡季控广告"
        - "补货计划"
      scope:
        does:
          - "计算可售天数、补货点和建议补货量"
          - "识别旺季不断货和淡季压货风险"
          - "联动广告节奏、促销节奏和现金占用"
          - "输出 replenishment_plan"
        does_not:
          - "未经确认下采购单"
          - "未经确认改价、改预算或清仓"
          - "用站外趋势替代真实库存和销量"
      capabilities:
        - "淡旺季窗口判断"
        - "销量情景测算"
        - "补货点与补货量测算"
        - "广告库存联动建议"
      outputs:
        - format: markdown
          path: "reports/{date}_淡旺季补货_{asin_or_sku}_{marketplace}_V{version}.md when requested"
      constraints:
        - "采购、压货、清仓、改价、改预算必须人工确认"
        - "新品未验证转化前不得按乐观旺季销量大量补货"
        - "缺交期、在途、MOQ、采购成本时只能输出风险预估"
      quality_gates:
        - "输出保守、基准、旺季三种可售天数"
        - "补货建议说明现金占用和断货/压货风险"
        - "广告节奏建议只建议不执行"
      sub_skills:
        - "amazon-seasonal-replenishment"
      estimated_tokens: 10000
      estimated_duration_min: 6

    - skill_id: knowledge_digest
      name: "资料消化"
      description: "读取长文档/多文件/课程资料，提取关键要点、生成结构化摘要和行动项"
      triggers:
        - "消化资料"
        - "总结这篇文章"
        - "提炼要点"
        - "帮我看看这个文档"
      scope:
        does:
          - "按 context-policy 压缩长文档"
          - "提取目标/事实/决策/风险/行动"
        does_not:
          - "把外部资料当作绝对真理写入知识库"
      capabilities:
        - "EVR Loop"
        - "L0-L4 五级压缩策略"
        - "摘要来源追溯"
      estimated_tokens: 5000
      estimated_duration_min: 2

    - skill_id: traffic_anomaly_diagnosis
      name: "流量异常诊断"
      description: "当产品流量/排名出现异常时，系统性诊断原因并给出恢复方案"
      triggers:
        - "流量异常"
        - "排名掉了"
        - "突然没单了"
        - "崩盘"
      scope:
        does:
          - "对比历史流量数据"
          - "检查竞品动态"
          - "诊断可能的根因（广告/Listing/类目/竞品）"
        does_not:
          - "在未确认根因时盲目调价"
      capabilities:
        - "SDR Loop"
        - "多维度根因分析"
        - "恢复方案 + 时间预估"
      estimated_tokens: 10000
      estimated_duration_min: 5

  # ── Skill 组合 ──────────────────────────────────────────────

  compositions:
    # 多个 skill 可以组合成复合能力
    - id: skill_ops
      name: "技能运营"
      description: "技能管理 + 技能路径规划 → 维护千里马能力地图并自动选择执行路线"
      skills: [skill_management, skill_path_planning]
      estimated_tokens: 9000
      estimated_duration_min: 8

    - id: daily_patrol
      name: "每日运营巡检"
      description: "关键词扫描 + 广告日报 + 销量台账 → 一次输出"
      skills: [keyword_rank_scan, daily_ad_report]
      estimated_tokens: 18000
      estimated_duration_min: 8

    - id: post_pd_recovery
      name: "PD 后恢复诊断"
      description: "关键词扫描 + 流量异常诊断 → 定位 PD 后恢复瓶颈"
      skills: [keyword_rank_scan, traffic_anomaly_diagnosis]
      estimated_tokens: 16000
      estimated_duration_min: 7

  # ── Skill 审计 ──────────────────────────────────────────────

  audit:
    metrics:
      - "每个 skill 的执行次数"
      - "首次通过率（无需 refine 即通过 quality gates）"
      - "平均 token 消耗 vs 预估"
      - "用户接受率"
      - "anti_rationalization 触发次数（Agent 试图偷懒被拦截）"
    review_frequency: monthly

  # ── 🆕 黄金模板（Raven Agent Templates 借鉴）─────────────────

  golden_templates:
    description: >
      当某个 skill 的 workflow 执行连续 5 次 eval_score ≥ 0.85，
      自动提取参数快照为"黄金模板"。后续执行优先加载黄金模板参数。
      模板每 30 天自动审查，效果下降则降级。
    storage: ".qianlima/golden-templates/{skill_id}-{date}.yaml"
    auto_extraction: true
    quality_threshold: 0.85
    consecutive_runs: 5
    review_interval_days: 30
    degradation_threshold: 0.70

  # ── 🆕 主动式 Skill（Raven Proactivity 借鉴）──────────────────

  proactivity:
    description: >
      千里马可以主动监控关键指标并在触发条件时自动执行。
      所有自动操作均为低风险（只读/诊断），高风险操作从不自动执行。
    source: proactivity.yaml

    triggers:
      - {id: auto_keyword_scan, condition: "last_scan > 7 days", action: "自动关键词扫描", risk: low}
      - {id: auto_health_check, condition: "session_start", action: "自动健康检查", risk: low}
      - {id: auto_memory_audit, condition: "weekly", action: "自动记忆审计", risk: low}

    authorization_required: true  # 首次使用需用户逐条确认
