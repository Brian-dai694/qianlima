# token-usage-record_template.yaml
# Copy this structure into .qianlima/usage-ledger/ for each real run.
# Do not commit real usage ledgers if they contain private task names, account data, or billing details.

run:
  run_id: YYYY-MM-DD_workflow_or_task_001
  date: YYYY-MM-DD
  task_name: replace_me
  workflow_id: replace_me
  model_provider: replace_me
  model_name: replace_me

token_usage:
  startup_tokens_estimated:
    minimal_input_low: 6622
    minimal_input_high: 12140
    standard_input_low: 11174
    standard_input_high: 20485
    note: Current public-template startup package estimates. Recalculate after major file changes.
  actual:
    input_tokens: 0
    output_tokens: 0
    cached_input_tokens: 0
    reasoning_tokens: 0
    total_tokens: 0

cost:
  currency: USD
  input_price_per_1m_tokens: 0
  output_price_per_1m_tokens: 0
  cached_input_price_per_1m_tokens: 0
  estimated_cost: 0
  formula: "(input_tokens / 1000000 * input_price) + (output_tokens / 1000000 * output_price) + (cached_input_tokens / 1000000 * cached_input_price)"

context:
  startup_profile: minimal
  files_loaded:
    - .qianlima/WORKSPACE_INDEX.md
  compression_used: false
  context_policy: .qianlima/context-policy.yaml
  loaded_file_count: 1

result:
  output_file: replace_me
  data_sources_used:
    - replace_me
  user_visible_cost_summary: true
  task_success: false
  user_edit_required: unknown
  source_citation_present: false
  elapsed_seconds: 0
  performance_notes: replace_me
  notes: replace_me
